version: "3.8"
services:
  neo4j:
    image: neo4j:5.18
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/kovexpassword
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "kovexpassword", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - neo4j_data:/data
      - ./db:/var/lib/neo4j/import/db

  neo4j-init:
    image: neo4j:5.18
    depends_on:
      neo4j:
        condition: service_healthy
    entrypoint: >
      cypher-shell -a bolt://neo4j:7687 -u neo4j -p kovexpassword
      -f /var/lib/neo4j/import/db/schema.cypher
    volumes:
      - ./db:/var/lib/neo4j/import/db
    restart: "no"

  kovex:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: kovexpassword
      HOP_RADIUS: "2"
    volumes:
      - ./logs:/app/logs

volumes:
  neo4j_data:
